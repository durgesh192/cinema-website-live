<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CINEMA</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #2b2b2b; color: #fff; padding: 20px; }
        
        .top-header { background-color: #1a1a1a; padding: 15px 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; margin-bottom: 20px; }
        .top-header h2 { color: #ff6b00; display: flex; align-items: center; gap: 10px; font-size: 24px; }
        .refresh-btn { background-color: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .refresh-btn:hover { background-color: #444; }

        .section-title { color: #ff4747; font-size: 22px; margin-top: 30px; margin-bottom: 15px; border-bottom: 2px solid #ff4747; padding-bottom: 5px; }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }

        .card { background-color: #1a1a1a; border-radius: 8px; padding: 20px; border: 1px solid #333; }
        .card h3 { color: #ff6b00; margin-bottom: 20px; font-size: 20px; }

        form { display: flex; flex-direction: column; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #333; background-color: #111; color: white; font-size: 14px; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #ff6b00; }
        
        .btn-orange { background-color: #ff6b00; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: fit-content; }
        .btn-orange:hover { background-color: #e65c00; }
        .btn-blue { background-color: #0088cc; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: fit-content; }
        .btn-blue:hover { background-color: #0077b3; }
        
        .list-container { max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .list-container::-webkit-scrollbar { width: 8px; }
        .list-container::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        
        .list-item, .banner-item { background-color: #221111; border: 1px solid #441111; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center; }
        .list-item img { width: 70px; height: 100px; object-fit: cover; border-radius: 5px; }
        .banner-item img { width: 120px; height: 60px; object-fit: cover; border-radius: 5px; }
        .item-details { flex: 1; }
        .item-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .item-meta { font-size: 12px; color: #aaa; margin-bottom: 10px; }
        .item-actions { display: flex; gap: 10px; align-items: center; }
        
        .btn-update { background-color: #ffaa00; color: black; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-delete { background-color: #cc0000; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="top-header">
        <h2>🎬 Admin Dashboard</h2>
        <button class="refresh-btn" onclick="loadAllData()">Refresh All Data</button>
    </div>

    <div class="card" style="margin-bottom: 30px;">
        <h3>📊 Content Analytics</h3>
        <canvas id="categoryChart" style="max-height: 250px;"></canvas>
    </div>

    <h2 class="section-title">Manage Movies & Web Series</h2>
    
    <div class="grid-container">
        <div class="card">
            <h3>Add Movie / Series Poster</h3>
            <form id="movieForm" autocomplete="off" onsubmit="addMovie(event)">
                <input type="text" id="m_title" placeholder="Title" required>
                <input type="text" id="m_poster" placeholder="Poster Image URL" required>
                <input type="text" id="m_link" placeholder="Main Link (Leave blank for Web Series)">
                <select id="m_category" required>
                    <option value="Bollywood">Bollywood</option>
                    <option value="Hollywood">Hollywood</option>
                    <option value="South">South</option>
                    <option value="Web Series">Web Series</option>
                    <option value="Live">Live</option>
                </select>
                <select id="m_trending">
                    <option value="Normal">Normal</option>
                    <option value="Trending">Trending</option>
                    <option value="Popular">Popular</option>
                </select>
                <select id="m_language">
                    <option value="Hindi">Hindi</option>
                    <option value="English">English</option>
                    <option value="Dual Audio">Dual Audio</option>
                </select>
                <button type="submit" class="btn-orange">Add to Website</button>
            </form>
        </div>

        <div class="card">
            <h3>All Database Items</h3>
            <div class="list-container" id="movieList">
                <p style="color:#888;">Loading...</p>
            </div>
        </div>
    </div>

    <div class="grid-container">
        <div class="card">
            <h3>➕ Add Episode (Web Series)</h3>
            <form id="episodeForm" autocomplete="off" onsubmit="addEpisode(event)">
                <select id="ep_seriesId" required><option value="">Select a Web Series...</option></select>
                <input type="text" id="ep_title" placeholder="Episode Title (e.g. S01 E01)" required>
                <input type="text" id="ep_link" placeholder="Episode Video/Download Link" required>
                <button type="submit" class="btn-blue">Add Episode</button>
            </form>
        </div>
        <div class="card" style="visibility: hidden;"></div>
    </div>

    <h2 class="section-title">Manage Carousel (Banners & Live)</h2>

    <div class="grid-container">
        <div class="card">
            <h3>Add Banner</h3>
            <form id="bannerForm" autocomplete="off" onsubmit="addBanner(event)">
                <input type="text" id="b_title" placeholder="Title (e.g. IND vs AUS Live)" required>
                <textarea id="b_desc" rows="3" placeholder="Description..." required></textarea>
                <input type="text" id="b_image" placeholder="Wide Banner Image URL" required>
                <input type="text" id="b_link" placeholder="Link to open when clicked">
                <button type="submit" class="btn-orange">Add Banner</button>
            </form>
        </div>
        <div class="card">
            <h3>Active Banners</h3>
            <div class="list-container" id="bannerList">
                <p style="color:#888;">Loading...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        let myChart = null; // Store chart instance

        window.addEventListener('load', () => {
            document.getElementById('movieForm').reset();
            document.getElementById('bannerForm').reset();
            document.getElementById('episodeForm').reset();
            loadAllData();
        });

        async function loadAllData() { fetchMovies(); fetchBanners(); }

        async function fetchMovies() {
            try {
                const res = await fetch('/api/movies');
                const movies = await res.json();
                
                const movieList = document.getElementById('movieList');
                const seriesDropdown = document.getElementById('ep_seriesId');
                movieList.innerHTML = '';
                seriesDropdown.innerHTML = '<option value="">Select a Web Series...</option>';

                let bolly = 0, holly = 0, south = 0, web = 0, live = 0;

                movies.forEach(m => {
                    // Analytics Count
                    if(m.category === 'Bollywood') bolly++;
                    else if(m.category === 'Hollywood') holly++;
                    else if(m.category === 'South') south++;
                    else if(m.category === 'Web Series') web++;
                    else live++;

                    movieList.innerHTML += `
                        <div class="list-item">
                            <img src="${m.poster || m.img || 'https://via.placeholder.com/70x100'}" alt="Poster">
                            <div class="item-details">
                                <div class="item-title">${m.title}</div>
                                <div class="item-meta">${m.category || 'Movie'} | Eps: ${m.episodes ? m.episodes.length : 0}</div>
                                <div class="item-actions">
                                    <select style="width:100px; padding:5px; font-size:12px;">
                                        <option>Trending</option>
                                        <option>Popular</option>
                                    </select>
                                    <button class="btn-update" onclick="alert('Update feature coming soon')">Update</button>
                                    <button class="btn-delete" onclick="deleteItem('${m._id}', 'movies')">Delete</button>
                                </div>
                            </div>
                        </div>
                    `;
                    if(m.category && m.category.toLowerCase() === 'web series') {
                        seriesDropdown.innerHTML += `<option value="${m._id}">${m.title}</option>`;
                    }
                });

                // Update Chart
                const ctx = document.getElementById('categoryChart').getContext('2d');
                if(myChart) myChart.destroy();
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Bollywood', 'Hollywood', 'South', 'Web Series', 'Live/Other'],
                        datasets: [{
                            label: 'Total Content Available',
                            data: [bolly, holly, south, web, live],
                            backgroundColor: ['#e50914', '#ff6b00', '#0088cc', '#ffaa00', '#22a6b3']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

            } catch (err) { console.error("Error fetching movies", err); }
        }

        async function addMovie(e) {
            e.preventDefault();
            const data = { title: document.getElementById('m_title').value, poster: document.getElementById('m_poster').value, link: document.getElementById('m_link').value, category: document.getElementById('m_category').value, language: document.getElementById('m_language').value };
            try { await fetch('/api/movies', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                alert('Movie Added!'); document.getElementById('movieForm').reset(); fetchMovies(); } catch (err) { alert('Error'); }
        }

        async function addEpisode(e) { e.preventDefault(); alert("Episode Added!"); document.getElementById('episodeForm').reset(); }

        async function fetchBanners() {
            try {
                const res = await fetch('/api/banners'); const banners = await res.json();
                const bannerList = document.getElementById('bannerList'); bannerList.innerHTML = '';
                banners.forEach(b => {
                    bannerList.innerHTML += `
                        <div class="banner-item">
                            <img src="${b.image}" alt="Banner">
                            <div class="item-details"><div class="item-title">${b.title}</div><button class="btn-delete" onclick="deleteItem('${b._id}', 'banners')">Remove</button></div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        async function addBanner(e) {
            e.preventDefault();
            const data = { title: document.getElementById('b_title').value, desc: document.getElementById('b_desc').value, image: document.getElementById('b_image').value, link: document.getElementById('b_link').value };
            try { await fetch('/api/banners', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                alert('Banner Added!'); document.getElementById('bannerForm').reset(); fetchBanners(); } catch (err) { alert('Error'); }
        }

        async function deleteItem(id, type) {
    if(confirm("Are you sure you want to delete this permanently?")) { 
        try {
            await fetch(`/api/${type}/${id}`, { method: 'DELETE' });
            alert("✅ Deleted Successfully!");
            loadAllData(); // Screen ko turant refresh karne ke liye
        } catch (err) {
            alert("❌ Error deleting item.");
        }
    }
}
    </script>
</body>
</html>
