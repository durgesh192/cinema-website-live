<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CINEMA Watch Party - Pro</title>
  <style>
    body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
    
    .video-container { flex: 7; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0f1014; position: relative; }
    .custom-player { width: 90%; max-height: 80vh; position: relative; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); background: #000; overflow: hidden; border: 1px solid #222; }
    #moviePlayer { width: 100%; display: block; outline: none; }
    
    .player-controls { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px; display: flex; flex-direction: column; gap: 10px; opacity: 0; transition: opacity 0.3s; box-sizing: border-box; }
    .custom-player:hover .player-controls { opacity: 1; }
    .progress-bar { width: 100%; cursor: pointer; height: 5px; background: #555; border-radius: 5px; position: relative; }
    .progress-filled { height: 100%; background: #e50914; width: 0%; border-radius: 5px; }
    .controls-main { display: flex; justify-content: space-between; align-items: center; }
    .controls-left, .controls-right { display: flex; gap: 15px; align-items: center; }
    .ctrl-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; transition: 0.2s; }
    .ctrl-btn:hover { color: #e50914; transform: scale(1.1); }

    .floating-emoji { position: absolute; bottom: 80px; font-size: 30px; animation: floatUp 3s ease-in-out forwards; z-index: 100; opacity: 0; }
    @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-300px) scale(1.5); opacity: 0; } }

    #video-grid { position: absolute; top: 25px; right: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 50; }
    .video-wrapper { position: relative; width: 180px; height: 100px; border-radius: 12px; overflow: hidden; background: #1a1a1a; border: 2px solid #333; box-shadow: 0 8px 25px rgba(0,0,0,0.9); }
    .video-wrapper video { width: 100%; height: 100%; object-fit: cover; }
    .video-label { position: absolute; bottom: 5px; left: 8px; background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 10px; backdrop-filter: blur(4px); }

    .call-controls { position: absolute; top: 25px; left: 25px; display: flex; gap: 15px; z-index: 50; background: rgba(20, 20, 20, 0.6); padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
    .call-btn { background: #2b2b2b; color: white; border: none; border-radius: 50%; cursor: pointer; width: 45px; height: 45px; transition: 0.3s; }
    .call-btn.muted { background: #e50914; }

    .chat-container { flex: 3; background: #0a0a0a; display: flex; flex-direction: column; border-left: 1px solid #222; }
    .chat-header { padding: 20px; text-align: center; border-bottom: 1px solid #222; background: #111; }
    .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .msg { background: #1e1e1e; padding: 10px 15px; border-radius: 15px; width: fit-content; max-width: 85%; font-size: 14px; }
    .my-msg { background: #3a1010; align-self: flex-end; border: 1px solid #e50914; }
    
    .emoji-bar { display: flex; justify-content: space-around; padding: 10px; background: #111; border-top: 1px solid #222; }
    .emoji-btn { background: none; border: none; font-size: 24px; cursor: pointer; transition: 0.2s; }
    .emoji-btn:hover { transform: scale(1.3); }

    .chat-input { display: flex; padding: 15px; background: #0a0a0a; gap: 10px; }
    .chat-input input { flex: 1; padding: 12px; border-radius: 20px; background: #1a1a1a; border: 1px solid #333; color: white; outline: none; }
    .chat-input button { background: #e50914; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <div class="video-container" id="videoContainer">
    <div id="video-grid"></div> 
    
    <div class="call-controls">
      <button class="call-btn" id="muteBtn" onclick="toggleMic()">🎤</button>
      <button class="call-btn" id="camBtn" onclick="toggleCam()">📹</button>
    </div>

    <div class="custom-player" id="customPlayer">
      <video id="moviePlayer" src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
      <div class="player-controls">
        <div class="progress-bar" id="progressBar" onclick="seekVideo(event)"><div class="progress-filled" id="progressFilled"></div></div>
        <div class="controls-main">
          <div class="controls-left">
            <button class="ctrl-btn" onclick="togglePlay()">⏯️</button>
            <span id="timeDisplay" style="font-size: 14px;">00:00 / 00:00</span>
          </div>
          <div class="controls-right">
            <button class="ctrl-btn" onclick="toggleFullScreen()">⛶</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <h3 style="color:#e50914; margin:0;">Watch Party</h3>
      <small id="roomDisplay" style="cursor:pointer; color:#aaa;" onclick="copyRoomLink()">🔗 Copy Invite Link</small>
    </div>
    <div class="chat-box" id="chatBox"></div>
    
    <div class="emoji-bar">
      <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
      <button class="emoji-btn" onclick="sendEmoji('❤️')">❤️</button>
      <button class="emoji-btn" onclick="sendEmoji('😮')">😮</button>
      <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
      <button class="emoji-btn" onclick="sendEmoji('👏')">👏</button>
    </div>

    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>

  <script>
    const socket = io();
    const urlParams = new URLSearchParams(window.location.search);
    let roomId = urlParams.get('room') || crypto.randomUUID();
    window.history.replaceState(null, null, `?room=${roomId}`);

    function copyRoomLink() { navigator.clipboard.writeText(window.location.href); alert("Link Copied!"); }

    // CUSTOM PLAYER
    const video = document.getElementById("moviePlayer");
    const progressFilled = document.getElementById("progressFilled");
    const timeDisplay = document.getElementById("timeDisplay");
    let externalEvent = false;

    function togglePlay() { if (video.paused) { video.play(); } else { video.pause(); } }
    function toggleFullScreen() {
      const player = document.getElementById("customPlayer");
      if (!document.fullscreenElement) { player.requestFullscreen().catch(err => console.log(err)); } 
      else { document.exitFullscreen(); }
    }
    function formatTime(seconds) { const min = Math.floor(seconds / 60); const sec = Math.floor(seconds % 60); return `${min}:${sec < 10 ? '0' : ''}${sec}`; }

    video.addEventListener("timeupdate", () => {
      const percent = (video.currentTime / video.duration) * 100;
      progressFilled.style.width = `${percent}%`;
      timeDisplay.innerText = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    });
    function seekVideo(e) {
      const bar = document.getElementById("progressBar");
      const newTime = (e.offsetX / bar.offsetWidth) * video.duration;
      video.currentTime = newTime;
      if (!externalEvent) socket.emit("seek-video", newTime);
    }

    video.addEventListener("play", () => { if (!externalEvent) socket.emit("play-video"); externalEvent = false; });
    video.addEventListener("pause", () => { if (!externalEvent) socket.emit("pause-video"); externalEvent = false; });

    socket.on("play-video", () => { externalEvent = true; video.play(); });
    socket.on("pause-video", () => { externalEvent = true; video.pause(); });
    socket.on("seek-video", (time) => { externalEvent = true; video.currentTime = time; });

    // EMOJIS
    function showFloatingEmoji(emoji) {
      const emojiEl = document.createElement("div");
      emojiEl.className = "floating-emoji";
      emojiEl.innerText = emoji;
      emojiEl.style.left = `${Math.random() * 80 + 10}%`;
      document.getElementById("videoContainer").appendChild(emojiEl);
      setTimeout(() => emojiEl.remove(), 3000); 
    }
    function sendEmoji(emoji) { showFloatingEmoji(emoji); socket.emit("send-emoji", emoji); }
    socket.on("receive-emoji", (emoji) => { showFloatingEmoji(emoji); });

    // WEBRTC CALL
    const videoGrid = document.getElementById('video-grid');
    const myVideo = document.createElement('video');
    myVideo.muted = true; 
    let myVideoStream;
    const peers = {};
    const myPeer = new Peer(); 

    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
      myVideoStream = stream;
      addVideoStream(myVideo, stream, "You"); 
      myPeer.on('call', call => {
        call.answer(stream);
        const userVideo = document.createElement('video');
        call.on('stream', userVideoStream => { addVideoStream(userVideo, userVideoStream, "Friend"); });
      });
      socket.on('user-connected', userId => { setTimeout(() => { connectToNewUser(userId, stream); }, 1000); });
    }).catch(err => console.log("Camera blocked"));

    socket.on('user-disconnected', userId => { 
        if (peers[userId]) peers[userId].close(); 
        const wrapper = document.getElementById('wrapper-' + userId);
        if(wrapper) wrapper.remove();
    });

    myPeer.on('open', id => { socket.emit('join-room', roomId, id); });

    function connectToNewUser(userId, stream) {
      const call = myPeer.call(userId, stream);
      const userVideo = document.createElement('video');
      call.on('stream', userVideoStream => { addVideoStream(userVideo, userVideoStream, "Friend", userId); });
      peers[userId] = call;
    }

    function addVideoStream(video, stream, labelText, userId = null) {
      video.srcObject = stream;
      video.addEventListener('loadedmetadata', () => { video.play(); });
      const wrapper = document.createElement('div');
      wrapper.className = 'video-wrapper';
      if(userId) wrapper.id = 'wrapper-' + userId;
      const label = document.createElement('div');
      label.className = 'video-label';
      label.innerText = labelText;
      wrapper.append(video);
      wrapper.append(label);
      videoGrid.append(wrapper);
    }

    function toggleMic() { myVideoStream.getAudioTracks()[0].enabled = !myVideoStream.getAudioTracks()[0].enabled; document.getElementById('muteBtn').classList.toggle('muted'); }
    function toggleCam() { myVideoStream.getVideoTracks()[0].enabled = !myVideoStream.getVideoTracks()[0].enabled; document.getElementById('camBtn').classList.toggle('muted'); }

    // CHAT
    const chatBox = document.getElementById("chatBox");
    const chatInput = document.getElementById("chatInput");
    function sendMessage() {
      const msg = chatInput.value.trim();
      if(msg === "") return;
      chatBox.innerHTML += `<div class="msg my-msg">${msg}</div>`;
      socket.emit("send-message", msg);
      chatInput.value = "";
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    socket.on("receive-message", (msg) => { chatBox.innerHTML += `<div class="msg">${msg}</div>`; chatBox.scrollTop = chatBox.scrollHeight; });
  </script>
</body>
</html>
