<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Party - CINEMA</title>
    <style>
        body { background-color: #111; color: white; font-family: Arial, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; }
        #setup-screen { background: #222; padding: 30px; border-radius: 10px; margin-top: 50px; }
        select, input, button { padding: 10px; margin: 10px 0; width: 100%; border-radius: 5px; border: none; font-size: 16px; }
        button { background-color: #ff6b00; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #e65c00; }
        
        #watch-room { display: none; }
        #video-container { width: 100%; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 20px; aspect-ratio: 16/9; }
        video, iframe { width: 100%; height: 100%; border: none; }
        
        #chat-box { background: #222; padding: 15px; border-radius: 10px; height: 200px; overflow-y: auto; text-align: left; }
        #chat-input { display: flex; gap: 10px; margin-top: 10px; }
        #chat-input input { width: 80%; }
        #chat-input button { width: 20%; background-color: #0088cc; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="setup-screen">
        <h2>🍿 Create a Watch Party</h2>
        <p>Select a movie or live match to watch with friends!</p>
        
        <select id="movie-select">
            <option value="">Loading movies...</option>
        </select>
        
        <input type="text" id="username" placeholder="Enter your name" required>
        <button onclick="createRoom()">Create / Join Party</button>
    </div>

    <div id="watch-room">
        <h2 id="room-title">Watch Party</h2>
        <p style="color: #aaa;">Share this link to invite friends: <span id="invite-link" style="color: #ff6b00;"></span></p>

        <div id="video-container">
            </div>

        <div id="chat-section">
            <div id="chat-box"></div>
            <div id="chat-input">
                <input type="text" id="msg-input" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let currentRoom = '';
    let myName = '';
    let moviesData = [];

    // 1. Database se Movies mangao
    window.onload = async () => {
        try {
            const res = await fetch('/api/movies');
            moviesData = await res.json();
            const select = document.getElementById('movie-select');
            select.innerHTML = '<option value="">-- Select a Movie/Match --</option>';
            
            moviesData.forEach(movie => {
                select.innerHTML += `<option value="${movie.link}">${movie.title}</option>`;
            });
        } catch (err) {
            console.error("Error fetching movies");
        }
    };

    // 2. Room Create/Join karo
    function createRoom() {
        const selectedLink = document.getElementById('movie-select').value;
        myName = document.getElementById('username').value;

        if (!selectedLink || !myName) return alert("Please select a movie and enter your name!");

        // Ek random Room ID bnao (Ya URL se lo)
        currentRoom = Math.random().toString(36).substring(2, 8);
        
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('watch-room').style.display = 'block';
        document.getElementById('invite-link').innerText = window.location.href + "?room=" + currentRoom;

        // Player Set karo (MP4 vs Iframe)
        const videoContainer = document.getElementById('video-container');
        if (selectedLink.endsWith('.mp4') || selectedLink.endsWith('.m3u8')) {
            videoContainer.innerHTML = `<video id="video-player" src="${selectedLink}" controls></video>`;
            setupVideoSync();
        } else {
            // Agar Embed link hai
            videoContainer.innerHTML = `<iframe src="${selectedLink}" allowfullscreen></iframe>`;
            addChatMsg("System", "Embed video detected. Auto-sync is disabled. Please count 3-2-1 and play together in chat!");
        }

        // Server ko batao ki room join kar liya
        socket.emit("join-room", currentRoom, myName);
    }

    // 3. Direct Video Auto-Sync Logic
    function setupVideoSync() {
        const video = document.getElementById('video-player');
        
        video.addEventListener('play', () => socket.emit('play-video'));
        video.addEventListener('pause', () => socket.emit('pause-video'));
        video.addEventListener('seeked', () => socket.emit('seek-video', video.currentTime));

        socket.on('play-video', () => video.play());
        socket.on('pause-video', () => video.pause());
        socket.on('seek-video', (time) => { video.currentTime = time; });
    }

    // 4. Chat System
    function sendMessage() {
        const msg = document.getElementById('msg-input').value;
        if (!msg) return;
        socket.emit("send-message", { name: myName, text: msg });
        addChatMsg(myName, msg);
        document.getElementById('msg-input').value = '';
    }

    socket.on("receive-message", (data) => { addChatMsg(data.name, data.text); });
    socket.on("user-connected", (user) => { addChatMsg("System", `${user} joined the party! 🎉`); });

    function addChatMsg(sender, msg) {
        const box = document.getElementById('chat-box');
        box.innerHTML += `<p><strong>${sender}:</strong> ${msg}</p>`;
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
