<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINEMA - Premium Streaming</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <div class="app-container">
    <nav class="sidebar">
      <div class="logo">C</div>
      <div class="nav-links">
        <a href="#" class="active" title="Home">🏠</a>
        <a href="#" title="AI Voice Filter" onclick="openAIModal()">🎙️</a>
        <a href="#" title="Movies">🎬</a>
        <a href="/watch.html" title="Watch Party" target="_blank">👥</a>
      </div>
    </nav>

    <main class="main-content">
      <div class="banner-container">
        <div class="banner-wrapper" id="bannerWrapper"></div>
        <button class="banner-btn prev" onclick="moveBanner(-1)">&#10094;</button>
        <button class="banner-btn next" onclick="moveBanner(1)">&#10095;</button>
      </div>

      <div class="content-section">
        <div class="section-header">
            <h3 class="section-title">Trending Now</h3>
            <div style="display: flex; gap: 15px; align-items: center;">
                <input type="text" id="search" class="search-bar" placeholder="Search movies..." autocomplete="off">
                <button id="resetBtn" class="reset-btn" onclick="resetAIFilter()" style="display: none;">✖ Clear Filter</button>
            </div>
        </div>
        <div class="horizontal-list" id="moviesGrid">
          </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="aiModal">
    <div class="modal">
      <div class="modal-header">
        <h3 style="color:#e50914; margin:0;">🎙️ CINEMA AI</h3>
        <button class="close-btn" onclick="closeAIModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="chat-box" id="chatBox">
          <div style="color:#aaa; margin-bottom:10px;">Namaste! Mic dabaiye aur boliye aapko kaisi movie dekhni hai? ✨</div>
        </div>
        <div class="chat-input-area">
          <button id="micBtn" onclick="startVoiceSearch()">🎤</button>
          <input type="text" id="userInput" placeholder="Likh kar search karein..." autocomplete="off">
          <button class="send-btn" onclick="processAIFilter()">Filter</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <!-- 🔐 OTP LOGIN MODAL -->
  <div class="modal-overlay" id="loginModal" style="display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000;">
    <div class="modal" style="background: #111; padding: 30px; border-radius: 12px; text-align: center; max-width: 350px; width: 90%; border: 1px solid #333; box-shadow: 0px 4px 20px rgba(229, 9, 20, 0.3);">
      
      <h3 style="color:#e50914; margin: 0 0 10px 0; font-size: 22px;">🔒 Login with Phone</h3>
      <p style="color:#aaa; font-size: 13px; margin-bottom: 25px;">Enter your mobile number to continue</p>
      
      <!-- Step 1: Phone Number -->
      <div id="phoneStep">
          <input type="number" id="phoneNumber" placeholder="+91 | Enter 10 digit number" style="width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; text-align: center; font-size: 16px; letter-spacing: 1px;">
          <button onclick="sendOTP()" style="width: 100%; padding: 12px; background-color: #e50914; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.3s;">Send OTP</button>
      </div>

      <!-- Step 2: OTP Verification (Pehle chhupa rahega) -->
      <div id="otpStep" style="display: none;">
          <p style="color:#4caf50; font-size: 13px; margin-bottom: 15px;">OTP sent successfully to your number!</p>
          <input type="number" id="otpInput" placeholder="Enter 4-digit OTP" style="width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #4caf50; background: #222; color: white; text-align: center; font-size: 18px; letter-spacing: 5px;">
          <button onclick="verifyOTP()" style="width: 100%; padding: 12px; background-color: #4caf50; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.3s;">Verify & Login</button>
      </div>

      <button onclick="closeLoginModal()" style="margin-top: 20px; background: none; border: none; color: #888; cursor: pointer; text-decoration: underline;">Cancel</button>
    </div>
  </div>
    </div>
  </div>
</body>
</html>
